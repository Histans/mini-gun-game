<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mini Gun Game</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #111;
      color: white;
      font-family: Arial;
    }

    #target {
      width: 50px;
      height: 50px;
      background: red;
      border-radius: 50%;
      position: absolute;
      cursor: crosshair;
    }

    #score {
      position: fixed;
      top: 10px;
      left: 10px;
      font-size: 20px;
    }
  </style>
</head>
<body>

<div id="score">Score: 0</div>
<div id="target"></div>

<script>
  const target = document.getElementById("target");
  const scoreText = document.getElementById("score");

  let score = 0;

  function moveTarget() {
    const x = Math.random() * (window.innerWidth - 50);
    const y = Math.random() * (window.innerHeight - 50);

    target.style.left = x + "px";
    target.style.top = y + "px";
  }

  target.addEventListener("click", () => {
    score++;
    scoreText.innerText = "Score: " + score;
    moveTarget();
  });

  // Move target every 1 second
  setInterval(moveTarget, 1000);

  moveTarget();
</script>

</body>
</html>
