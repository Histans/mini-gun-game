<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zombie FPS</title>

<style>
body { margin:0; overflow:hidden; background:black; }

#crosshair {
  position:fixed;
  top:50%; left:50%;
  width:10px; height:10px;
  margin:-5px;
  background:white;
  border-radius:50%;
}

#hp {
  position:fixed;
  top:10px; left:10px;
  color:white;
  font-size:20px;
  font-family:Arial;
}
</style>
</head>

<body>

<div id="crosshair"></div>
<div id="hp">HP: 100</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/PointerLockControls.js"></script>

<script>
// scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);

// camera
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

// renderer
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// lighting
const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
scene.add(light);

// controls
const controls = new THREE.PointerLockControls(camera, document.body);
document.body.onclick = () => controls.lock();
scene.add(controls.getObject());

// ground (BIG MAP)
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(500,500),
  new THREE.MeshStandardMaterial({color:0x444444})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// walls
function createWall(x,z){
  const wall = new THREE.Mesh(
    new THREE.BoxGeometry(10,5,1),
    new THREE.MeshStandardMaterial({color:0x666666})
  );
  wall.position.set(x,2.5,z);
  scene.add(wall);
}

// map layout
for(let i=-50;i<=50;i+=10){
  createWall(i,-50);
  createWall(i,50);
  createWall(-50,i);
  createWall(50,i);
}

// 🔫 gun (better looking)
const gun = new THREE.Mesh(
  new THREE.BoxGeometry(0.2,0.2,1),
  new THREE.MeshStandardMaterial({color:0x111111})
);
gun.position.set(0.5,-0.5,-1);
camera.add(gun);
scene.add(camera);

// 🧟 zombies
let zombies = [];

function spawnZombie(){
  const z = new THREE.Mesh(
    new THREE.BoxGeometry(1,2,1),
    new THREE.MeshStandardMaterial({color:0x00aa00})
  );

  z.position.set(
    (Math.random()-0.5)*100,
    1,
    (Math.random()-0.5)*100
  );

  z.hp = 30;
  scene.add(z);
  zombies.push(z);
}

// spawn many zombies
for(let i=0;i<5;i++) spawnZombie();

// HP
let hp = 100;
const hpText = document.getElementById("hp");

// sound
const gunSound = new Audio("gunshot.mp3");

// shooting
const raycaster = new THREE.Raycaster();

document.addEventListener("mousedown", ()=>{
  gunSound.currentTime = 0;
  gunSound.play();

  // recoil
  gun.rotation.x -= 0.2;
  setTimeout(()=>gun.rotation.x += 0.2,100);

  raycaster.setFromCamera({x:0,y:0}, camera);

  zombies.forEach(z=>{
    const hit = raycaster.intersectObject(z);
    if(hit.length>0){
      z.hp -= 10;
      z.material.color.set(0xff0000);

      setTimeout(()=>z.material.color.set(0x00aa00),100);

      if(z.hp <= 0){
        scene.remove(z);
      }
    }
  });
});

// zombie AI
let lastHit = 0;

function updateZombies(){
  zombies.forEach(z=>{
    const dir = new THREE.Vector3();
    dir.subVectors(camera.position, z.position).normalize();

    z.position.add(dir.multiplyScalar(0.02));

    if(z.position.distanceTo(camera.position)<1.5 && Date.now()-lastHit>1000){
      hp -= 10;
      hpText.innerText = "HP: "+hp;
      lastHit = Date.now();

      if(hp<=0){
        alert("You Died 💀");
        location.reload();
      }
    }
  });
}

// movement
const keys = {};
onkeydown=e=>keys[e.key.toLowerCase()]=true;
onkeyup=e=>keys[e.key.toLowerCase()]=false;

function move(){
  if(keys["w"]) controls.moveForward(0.15);
  if(keys["s"]) controls.moveForward(-0.15);
  if(keys["a"]) controls.moveRight(-0.15);
  if(keys["d"]) controls.moveRight(0.15);
}

// loop
function animate(){
  requestAnimationFrame(animate);
  move();
  updateZombies();
  renderer.render(scene,camera);
}
animate();

// resize
onresize=()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
};
</script>

</body>
</html>
