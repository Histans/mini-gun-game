<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FPS Zombie Game</title>

<style>
body { margin:0; overflow:hidden; background:black; }

#crosshair {
  position:fixed;
  top:50%; left:50%;
  width:12px; height:12px;
  margin:-6px;
  border:2px solid white;
  border-radius:50%;
}

#hp {
  position:fixed;
  top:10px; left:10px;
  color:white;
  font-size:20px;
  font-family:Arial;
}
</style>
</head>

<body>

<div id="crosshair"></div>
<div id="hp">HP: 100</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/PointerLockControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

// CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHTING (important for realism)
const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
scene.add(light);

// CONTROLS (FPS)
const controls = new THREE.PointerLockControls(camera, document.body);
document.body.onclick = () => controls.lock();
scene.add(controls.getObject());

// FLOOR
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x333333})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// 🔫 GUN MODEL (ONLINE WORKING)
const loader = new THREE.GLTFLoader();
let gun;

loader.load("https://threejs.org/examples/models/gltf/DamagedHelmet/glTF/DamagedHelmet.gltf", (gltf) => {
  gun = gltf.scene;
  gun.scale.set(2,2,2);
  gun.position.set(0.5, -0.7, -1);
  camera.add(gun);
});

// 🧟 ZOMBIE MODEL (REAL)
let zombie;

loader.load("https://threejs.org/examples/models/gltf/RobotExpressive/RobotExpressive.glb", (gltf) => {
  zombie = gltf.scene;
  zombie.scale.set(0.4,0.4,0.4);
  zombie.position.set(0,0,-10);
  scene.add(zombie);
});

// ❤️ PLAYER HP
let hp = 100;
const hpText = document.getElementById("hp");

// 🔊 SOUND
const gunSound = new Audio("gunshot.mp3");

// 🎯 SHOOTING (RAYCAST)
const raycaster = new THREE.Raycaster();

document.addEventListener("mousedown", () => {
  gunSound.currentTime = 0;
  gunSound.play();

  // recoil
  if (gun) {
    gun.rotation.x -= 0.2;
    setTimeout(() => gun.rotation.x += 0.2, 100);
  }

  raycaster.setFromCamera({x:0,y:0}, camera);

  if (zombie) {
    const hits = raycaster.intersectObject(zombie, true);

    if (hits.length > 0) {
      zombie.traverse(obj => {
        if (obj.material) obj.material.color.set(0x00ff00);
      });

      setTimeout(() => {
        zombie.traverse(obj => {
          if (obj.material) obj.material.color.set(0xffffff);
        });
      }, 100);
    }
  }
});

// 👊 ZOMBIE AI
let lastHit = 0;

function updateZombie(){
  if (!zombie) return;

  const dir = new THREE.Vector3();
  dir.subVectors(camera.position, zombie.position).normalize();

  zombie.position.add(dir.multiplyScalar(0.02));

  const dist = zombie.position.distanceTo(camera.position);

  if (dist < 1.5 && Date.now() - lastHit > 1000) {
    hp -= 10;
    hpText.innerText = "HP: " + hp;
    lastHit = Date.now();

    if (hp <= 0) {
      alert("You Died 💀");
      location.reload();
    }
  }
}

// MOVEMENT
const keys = {};

onkeydown = e => keys[e.key.toLowerCase()] = true;
onkeyup = e => keys[e.key.toLowerCase()] = false;

function move(){
  if (keys["w"]) controls.moveForward(0.1);
  if (keys["s"]) controls.moveForward(-0.1);
  if (keys["a"]) controls.moveRight(-0.1);
  if (keys["d"]) controls.moveRight(0.1);
}

// LOOP
function animate(){
  requestAnimationFrame(animate);

  move();
  updateZombie();

  renderer.render(scene, camera);
}
animate();

// RESIZE FIX
onresize = () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
};
</script>

</body>
</html>
