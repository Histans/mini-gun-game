<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FPS Game</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial;
  }

  canvas {
    display: block;
  }

  /* 🎯 crosshair */
  #crosshair {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 12px;
    height: 12px;
    margin-left: -6px;
    margin-top: -6px;
    border: 2px solid white;
    border-radius: 50%;
  }

  /* ❤️ HP */
  #hp {
    position: fixed;
    top: 10px;
    left: 10px;
    color: white;
    font-size: 20px;
  }
</style>
</head>

<body>

<div id="crosshair"></div>
<div id="hp">HP: 100</div>

<!-- THREE JS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/PointerLockControls.js"></script>

<script>
// 🎮 SCENE
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

// 🎮 RENDERER
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 🔒 FPS CONTROLS
const controls = new THREE.PointerLockControls(camera, document.body);

document.body.addEventListener("click", () => {
  controls.lock();
});

scene.add(controls.getObject());

// 🌍 FLOOR
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(200, 200),
  new THREE.MeshBasicMaterial({ color: 0x222222 })
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// 🔫 FAKE GUN (visible)
const gun = new THREE.Mesh(
  new THREE.BoxGeometry(0.3, 0.2, 1),
  new THREE.MeshBasicMaterial({ color: 0x000000 })
);
gun.position.set(0.5, -0.5, -1);
camera.add(gun);
scene.add(camera);

// 🧍 ENEMY
const enemy = new THREE.Mesh(
  new THREE.BoxGeometry(1, 2, 1),
  new THREE.MeshBasicMaterial({ color: 0xff0000 })
);
enemy.position.set(0, 1, -10);
scene.add(enemy);

// ❤️ PLAYER HP
let hp = 100;
const hpText = document.getElementById("hp");

// 🔊 SOUND
const gunSound = new Audio("gunshot.mp3");

// 🎯 RAYCAST SHOOTING
const raycaster = new THREE.Raycaster();

document.addEventListener("mousedown", () => {
  gunSound.currentTime = 0;
  gunSound.play();

  raycaster.setFromCamera({ x: 0, y: 0 }, camera);
  const hits = raycaster.intersectObject(enemy);

  if (hits.length > 0) {
    enemy.material.color.set(0x00ff00);

    setTimeout(() => {
      enemy.material.color.set(0xff0000);
    }, 100);
  }
});

// 👊 ENEMY ATTACK
let lastHit = 0;

function updateEnemy() {
  const dir = new THREE.Vector3();
  dir.subVectors(camera.position, enemy.position).normalize();

  enemy.position.add(dir.multiplyScalar(0.03));

  const distance = enemy.position.distanceTo(camera.position);

  if (distance < 1.5 && Date.now() - lastHit > 1000) {
    hp -= 10;
    hpText.innerText = "HP: " + hp;

    lastHit = Date.now();

    if (hp <= 0) {
      alert("You Died 💀");
      location.reload();
    }
  }
}

// 🏃 MOVEMENT
const keys = {};

document.addEventListener("keydown", (e) => {
  keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", (e) => {
  keys[e.key.toLowerCase()] = false;
});

function move() {
  const speed = 0.1;

  if (keys["w"]) controls.moveForward(speed);
  if (keys["s"]) controls.moveForward(-speed);
  if (keys["a"]) controls.moveRight(-speed);
  if (keys["d"]) controls.moveRight(speed);
}

// 🔁 GAME LOOP
function animate() {
  requestAnimationFrame(animate);

  move();
  updateEnemy();

  renderer.render(scene, camera);
}

animate();

// 📱 RESIZE FIX
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
